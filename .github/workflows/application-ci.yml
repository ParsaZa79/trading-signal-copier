name: Application CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: application-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: copy_test
          POSTGRES_PASSWORD: copy_test_password
          POSTGRES_DB: copy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U copy_test -d copy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://copy_test:copy_test_password@127.0.0.1:5432/copy_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.14"
          enable-cache: true
          cache-dependency-glob: api/uv.lock
      - name: Install API dependencies
        working-directory: api
        run: uv sync --frozen
      - name: Lint API
        working-directory: api
        run: uv run ruff check .
      - name: Type-check API
        working-directory: api
        run: uv run pyright
      - name: Test API with PostgreSQL
        working-directory: api
        run: uv run pytest -q

  dashboard:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dashboard_test
          POSTGRES_PASSWORD: dashboard_test_password
          POSTGRES_DB: dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashboard_test -d dashboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://dashboard_test:dashboard_test_password@127.0.0.1:5432/dashboard_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile
      - name: Lint dashboard
        working-directory: dashboard
        run: bun run lint
      - name: Test dashboard with PostgreSQL
        working-directory: dashboard
        run: bun run test
      - name: Build dashboard
        working-directory: dashboard
        run: bun run build
