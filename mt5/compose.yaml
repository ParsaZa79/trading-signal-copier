services:
  mt5:
    build:
      context: ..
      dockerfile: mt5/Dockerfile
    image: trading-platform/mt5-rpyc:6.0.2
    restart: unless-stopped
    environment:
      CUSTOM_USER: ${MT5_VNC_USER:-parsa}
      PASSWORD: ${MT5_VNC_PASSWORD:?set MT5_VNC_PASSWORD}
    ports:
      - "127.0.0.1:${MT5_VNC_PORT:-3001}:3000"
    expose:
      - "8001"
    volumes:
      - mt5-config:/config
    networks:
      - trading-mt5-api

volumes:
  mt5-config:
    name: trading-mt5-config

networks:
  trading-mt5-api:
    name: trading-mt5-api
    external: true
