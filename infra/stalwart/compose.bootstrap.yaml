name: trading-platform-mail

services:
  stalwart:
    image: stalwartlabs/stalwart:v0.16@sha256:b30c99ed8240ea42612f784babe0388318d5c3668a77873efe7e3b1147e2226e
    hostname: mail.kiaparsaprintingmoneymachine.cloud
    restart: "no"
    init: true
    environment:
      STALWART_RECOVERY_ADMIN: ${STALWART_RECOVERY_ADMIN:?bootstrap-only recovery credential required}
    ports:
      - name: bootstrap-admin
        target: 8080
        published: "18080"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - stalwart-config:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
    networks:
      - bootstrap-admin
    labels:
      traefik.enable: "false"

networks:
  bootstrap-admin:
    driver: bridge
    internal: false

volumes:
  stalwart-config:
    name: trading-platform-mail-stalwart-config
  stalwart-data:
    name: trading-platform-mail-stalwart-data
